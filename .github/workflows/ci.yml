name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # `npm run lint` runs the public version of the obsidianmd plugin
      # rules. It catches most things the community-plugin validation bot
      # catches, but the bot uses a stricter unreleased rule for
      # `ui/sentence-case`. A green lint here is necessary but not
      # sufficient — see eslint.config.mjs for the full caveat.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
