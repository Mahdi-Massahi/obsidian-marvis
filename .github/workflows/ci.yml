name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # `npm run lint` mirrors the obsidianmd community-plugin validation bot
      # (eslint-plugin-obsidianmd recommended + require-await + no inline
      # disables). A green CI lint here is a strong predictor of the bot's
      # own report — see eslint.config.mjs for caveats.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
