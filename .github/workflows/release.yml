name: Release

# Push a tag matching the manifest version (no `v` prefix — Obsidian
# requires plain semver tags) to cut a release. Example:
#   git tag 0.1.0 && git push --tags

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)" >&2
            exit 1
          fi

      - name: Extract changelog section
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Pull the body for ## [<TAG>] up to (but not including) the next
          # ## heading. Falls back to auto-generated notes if the section is
          # missing or empty.
          awk -v ver="$TAG" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## / { exit }
            found && /^\[.*\]: / { next }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Trim leading/trailing blank lines.
          sed -i -e '/./,$!d' -e ':a' -e '/^\n*$/{$d;N;ba' -e '}' RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "HAS_NOTES=1" >> "$GITHUB_ENV"
          else
            echo "No CHANGELOG section found for $TAG — falling back to auto-generated notes."
            echo "HAS_NOTES=0" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Obsidian's installer fetches main.js, manifest.json, and styles.css
          # as individual files attached to the release — never zipped.
          if [ "$HAS_NOTES" = "1" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file RELEASE_NOTES.md \
              main.js manifest.json styles.css
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              main.js manifest.json styles.css
          fi
